<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parro | Software & Assets</title>
    <style>
        :root {
            --bg-black: #000000;
            --glass-navy: rgba(12, 12, 25, 0.85);
            --border-white: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a1a1a6;
            --accent-blue: #0071e3;
            --discord-blurple: #5865F2;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-font-smoothing: antialiased; 
            user-select: none; /* Prevents text highlighting/copying */
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow-x: hidden;
        }

        /* --- THANOS SNAP REVEAL --- */
        .reveal {
            opacity: 0;
            transform: translateY(40px) scale(0.92);
            filter: blur(20px);
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            filter: blur(0px);
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 900px;
            height: 54px;
            background: var(--glass-navy);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--border-white);
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            z-index: 2000;
        }

        nav .logo { font-weight: 700; font-size: 1.1rem; }
        nav .links a { color: var(--text-main); text-decoration: none; margin-left: 20px; font-size: 0.85rem; opacity: 0.7; transition: 0.3s; }
        nav .links a:hover { opacity: 1; }

        /* --- SECTIONS --- */
        section { padding: 120px 20px; max-width: 1200px; margin: 0 auto; text-align: center; }
        
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0a0a20 0%, #000 80%);
        }

        .hero h1 { font-size: clamp(3.5rem, 12vw, 7rem); font-weight: 800; letter-spacing: -0.04em; margin-bottom: 10px; }
        .hero p { font-size: clamp(1.2rem, 4vw, 1.8rem); color: var(--text-dim); }

        /* --- UI CARD --- */
        .ui-card {
            cursor: pointer;
            border-radius: 40px;
            overflow: hidden;
            border: 1px solid var(--border-white);
            background: #050505;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
        }
        .ui-card:hover { transform: scale(1.02); border-color: rgba(255,255,255,0.3); }
        .ui-card img { width: 100%; display: block; filter: brightness(0.8); transition: 0.6s; }
        .ui-card:hover img { filter: brightness(1); }
        .ui-card-label { position: absolute; bottom: 40px; left: 40px; font-size: 2.5rem; font-weight: 700; text-shadow: 0 10px 30px rgba(0,0,0,0.8); }

        /* --- GLASS CARDS --- */
        .glass-card {
            background: var(--glass-navy);
            border: 1px solid var(--border-white);
            border-radius: 40px;
            padding: 50px;
            backdrop-filter: blur(20px);
            max-width: 600px;
            margin: 40px auto;
        }

        .server-logo {
            width: 110px; height: 110px; border-radius: 28px;
            margin-bottom: 25px; border: 2px solid var(--border-white);
        }

        .btn {
            display: inline-block; padding: 18px 40px; border-radius: 16px;
            font-weight: 700; font-size: 1.1rem; text-decoration: none;
            cursor: pointer; transition: 0.3s; border: none;
        }

        /* --- GALLERY PAGE --- */
        #ui-gallery-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 3000;
            transform: translateY(100%); transition: 0.8s cubic-bezier(0.8, 0, 0.2, 1);
            overflow-y: auto; padding: 120px 20px;
        }
        #ui-gallery-page.open { transform: translateY(0); }
        .gallery-grid { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 60px; }
        .gallery-item img { width: 100%; border-radius: 30px; border: 1px solid var(--border-white); }
        .close-btn { position: fixed; top: 40px; right: 40px; background: white; color: black; padding: 14px 30px; border-radius: 50px; font-weight: 700; cursor: pointer; z-index: 3001; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 3.8rem; }
            .ui-card-label { font-size: 1.8rem; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <nav>
        <div class="logo">PARRO</div>
        <div class="links">
            <a href="#ui">Work</a>
            <a href="#store">Store</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <div id="wrapper">
        <section class="hero">
            <div class="reveal" style="background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; margin-bottom: 20px; border: 1px solid var(--border-white);">SECURE CONNECTION ESTABLISHED</div>
            <h1 class="reveal">Hi, I'm <span style="color: var(--accent-blue);">Parro.</span></h1>
            <p class="reveal">Software Architect & Digital Asset Creator</p>
        </section>

        <section id="ui">
            <h2 class="reveal" style="font-size: 3rem; margin-bottom: 50px; letter-spacing: -0.02em;">Visual Designs</h2>
            <div class="ui-card reveal" onclick="g_o()">
                <img src="https://s3-alpha.figma.com/hub/file/3685029277/50cfd3be-cb9c-4f60-8b9a-bccf9983c2ef-cover.png">
                <div class="ui-card-label">View Portfolio →</div>
            </div>
        </section>

        <section id="store">
            <h2 class="reveal" style="font-size: 3rem; margin-bottom: 20px;">Asset Store</h2>
            <p class="reveal" style="color: var(--text-dim); margin-bottom: 20px;">Premium resources for your next build.</p>
            <div class="glass-card reveal">
                <img class="server-logo" src="https://cdn.discordapp.com/attachments/1322471221069086840/1469987305149169759/IMG_5746.png?ex=6989a7dc&is=6988565c&hm=10981689013bcda7d7356a4c84d32a063dbe3e16bcb14182223ae3cbfadacf30&">
                <h3 style="font-size: 1.8rem; margin-bottom: 15px;">Parro's Assets</h3>
                <button onclick="s_l('aHR0cHM6Ly9kaXNjb3JkLmdnL3pRNjZCOHVuaHg=')" class="btn" style="background:var(--discord-blurple); color:white;">Join Server</button>
            </div>
        </section>

        <section id="contact">
            <h2 class="reveal" style="font-size: 3rem; margin-bottom: 20px;">Direct Inquiry</h2>
            <div class="glass-card reveal" style="border-color: var(--accent-blue);">
                <div style="font-size: 0.8rem; color: var(--accent-blue); font-weight: 700; letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase;">Discord Identity</div>
                <h3 style="font-size: 2.2rem; margin-bottom: 25px;">raid0742</h3>
                <button onclick="s_l('aHR0cHM6Ly9kaXNjb3JkLmNvbS91c2Vycy9yYWlkMDc0Mg==')" class="btn" style="background:white; color:black;">Shoot a DM</button>
            </div>
        </section>
    </div>

    <div id="ui-gallery-page">
        <div class="close-btn" onclick="g_c()">Close</div>
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="https://cdn.discordapp.com/attachments/1322471221069086840/1469985765978013728/HP_Elite_Dragonfly.png?ex=6989a66d&is=698854ed&hm=f3a20926b167d981be811e6f23c61aa1951862bb41fc38a59d62683c029644ec&">
            </div>
            <div class="gallery-item">
                <img src="https://cdn.discordapp.com/attachments/1322471221069086840/1469985766372282512/Galaxy_Tab_S8_Ultra.png?ex=6989a66d&is=698854ed&hm=2f49497a1eb4bf834c4050e925b802e93bf9441710c8222afec85b823162f7b4&">
            </div>
        </div>
    </div>

    <script>
        // --- SECURITY & PROTECTION ---
        // Blocks F12, Ctrl+U, and Inspect Element Shortcuts
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };

        // Decodes the Base64 Discord links on click
        function s_l(e){ window.open(atob(e), '_blank'); }

        // --- INTERACTIVITY ---
        function g_o(){ document.getElementById('ui-gallery-page').classList.add('open'); document.body.style.overflow='hidden'; }
        function g_c(){ document.getElementById('ui-gallery-page').classList.remove('open'); document.body.style.overflow='auto'; }

        // Thanos Snap Intersection Observer
        const obs = new IntersectionObserver(es => {
            es.forEach(e => {
                if(e.isIntersecting) e.target.classList.add('active');
                else e.target.classList.remove('active');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(x => obs.observe(x));

        // Smooth Scroll Logic
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>
